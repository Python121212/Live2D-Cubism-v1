<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live2D Ultra PWA App</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cubism.live2d.com/sdk-web/bin/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="theme-dark">

    <div id="app-container">
        
        <header>
            <select id="lang-selector">
                <option value="ja">日本語</option>
                <option value="en">English</option>
                <option value="ko">한국어</option>
                <option value="zh">中文</option>
            </select>
            <button id="theme-toggle">Toggle Theme (Black/White)</button>
            <div class="file-inputs">
                <label for="file-loader" class="btn">モデル読み込み (.json/.zip)</label>
                <input type="file" id="file-loader" multiple accept=".json,.zip,.moc3,.cfg">
            </div>
        </header>

        <main>
            <div id="canvas-container">
                <canvas id="live2d-canvas"></canvas>
                <video id="webcam" autoplay playsinline muted></video>
            </div>

            <div id="paint-container">
                <div class="paint-tools">
                    <input type="color" id="brush-color" value="#ffffff">
                    <input type="range" id="brush-size" min="1" max="50" value="5">
                    <button id="clear-canvas">Clear</button>
                </div>
                <canvas id="paint-canvas"></canvas>
            </div>
        </main>

        <footer>
            <button id="btn-mocap" class="btn">Mocap Start/Stop</button>
            <button id="btn-record" class="btn-rec">Rec Start (Background Mode)</button>
            <button id="btn-export" class="btn">途中書き出し (Export State)</button>
        </footer>
    </div>

    <script src="app.js"></script>
    <script src="live2d-core.js"></script>
    <script src="paint.js"></script>
    <script src="mocap.js"></script>
    <script src="recorder.js"></script>
    <script>
        // PWA Service Workerの登録
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker Registered'));
        }
    </script>
</body>
</html>
